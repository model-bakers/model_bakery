[tox]
requires =
    tox>=4.51.0
    tox-uv
env_list =
    # Python 3.10+ - Django 5.2
    py{310,311,312,313,314}-django52-{sqlite,postgresql,postgresql-psycopg3}
    # Python 3.12+ - Django 6.0
    py{312,313,314}-django60-{sqlite,postgresql,postgresql-psycopg3}
    # Python 3.12+ - Django 6.1
    py{312,313,314}-django61-{sqlite,postgresql,postgresql-psycopg3}
    # Latest Python/Django without contenttypes
    py314-django61-postgresql-no-contenttypes
    docs-build
    coverage-combine
    coverage-report

[testenv]
package = wheel
dependency_groups =
    tests
setenv =
    PYTHONPATH={toxinidir}
    USE_CONTENTTYPES=True
    postgresql,postgresql-psycopg3: TEST_DB=postgis
    postgresql,postgresql-psycopg3,postgresql-no-contenttypes: PGUSER=postgres
    postgresql,postgresql-psycopg3,postgresql-no-contenttypes: PGPASSWORD=postgres
    postgresql-no-contenttypes: USE_CONTENTTYPES=False
    postgresql-no-contenttypes: TEST_DB=postgresql
    sqlite: TEST_DB=sqlite
    sqlite: USE_TZ=True
deps =
    django52: Django>=5.2,<5.3
    django60: Django>=6.0a1,<6.1
    django61: Django>=6.1a1,<6.2
    postgresql: psycopg2-binary
    postgresql-psycopg3,postgresql-no-contenttypes: psycopg
commands =
    python \
        -m coverage run \
        -m pytest {posargs:tests}

[testenv:coverage-combine]
skip_install = true
dependency_groups =
    tests
commands = coverage combine

[testenv:coverage-report]
skip_install = true
dependency_groups =
    tests
depends = coverage-combine
commands =
    coverage html --skip-covered --skip-empty
    coverage report --fail-under=95

[testenv:docs-build]
dependency_groups =
    docs
commands = sphinx-build -W -b html docs docs/_build/html

[testenv:pre-commit]
skip_install = true
dependency_groups =
    lint
commands = pre-commit run --all-files
